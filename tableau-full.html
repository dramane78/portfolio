<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau des Compétences — Barry Dramane</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #06121c;
        }

        .tableau-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .tableau-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .control-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(8, 243, 255, 0.1);
            border: 1px solid rgba(8, 243, 255, 0.4);
            border-radius: 4px;
            color: #08f3ff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            text-decoration: none;
        }

        .control-btn:hover {
            background: rgba(8, 243, 255, 0.2);
            border-color: rgba(8, 243, 255, 0.6);
        }

        .control-btn.back {
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.4);
            color: #667eea;
        }

        .control-btn.back:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <div class="controls">
        <button class="control-btn" id="downloadBtn">
            <i class="fas fa-download"></i> Télécharger
        </button>
        <a href="index.html" class="control-btn back">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </div>

    <div class="tableau-container">
        <img src="tableau_competences_capture.png" alt="Tableau des compétences BTS SIO" class="tableau-image">
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const link = document.createElement('a');
            link.href = 'tableau_competences_capture.png';
            link.download = 'Tableau_Competences_Barry_Dramane.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
